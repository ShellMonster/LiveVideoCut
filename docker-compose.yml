services:
  api:
    build:
      context: ./backend
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        APT_MIRROR: ${APT_MIRROR:-}
        PYPI_INDEX_URL: ${PYPI_INDEX_URL:-}
    ports:
      - "5538:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - VLM_API_KEY=${VLM_API_KEY:-}
      - VLM_BASE_URL=${VLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - VLM_MODEL=${VLM_MODEL:-qwen-vl-plus}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  worker:
    build:
      context: ./backend
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        APT_MIRROR: ${APT_MIRROR:-}
        PYPI_INDEX_URL: ${PYPI_INDEX_URL:-}
    command: celery -A app.tasks.pipeline worker --loglevel=info --concurrency=1 --max-tasks-per-child=10 --max-memory-per-child=3000000 --prefetch-multiplier=1 -Ofair
    volumes:
      - ./uploads:/app/uploads
      - model_cache:/root/.cache
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - VLM_API_KEY=${VLM_API_KEY:-}
      - VLM_BASE_URL=${VLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - VLM_MODEL=${VLM_MODEL:-qwen-vl-plus}
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
      - APT_MIRROR=${APT_MIRROR:-}
    healthcheck:
      test: ["CMD", "python", "-c", "from celery import Celery; app = Celery('clipper', broker='${REDIS_URL:-redis://redis:6379/0}'); app.connection().ensure_connection(max_retries=2)"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  frontend:
    build:
      context: ./frontend
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    ports:
      - "5537:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
  model_cache:
  whisper_cache:
